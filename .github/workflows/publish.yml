name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish @tabkit/core
        run: npm publish --workspace=packages/tabkit --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tabkit/parser
        run: npm publish --workspace=packages/parser --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tabkit/player
        run: npm publish --workspace=packages/player --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tabkit/react
        run: npm publish --workspace=packages/react --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tabkit/audio
        run: npm publish --workspace=packages/audio --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}